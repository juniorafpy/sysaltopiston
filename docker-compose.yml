version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: sysalto-piston-app
    container_name: sysalto_app
    restart: unless-stopped
    working_dir: /var/www/
    volumes:
      - .:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - sysalto_net
    depends_on:
      - db
      - redis

  nginx:
    image: nginx:alpine
    container_name: sysalto_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - sysalto_net
    depends_on:
      - app

  db:
    image: postgres:15-alpine
    container_name: sysalto_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: sysalto_db
      POSTGRES_USER: sysalto_user
      POSTGRES_PASSWORD: sysalto_password
    volumes:
      - dbdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - sysalto_net

  redis:
    image: redis:7-alpine
    container_name: sysalto_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - sysalto_net

volumes:
  dbdata:

networks:
  sysalto_net:
    driver: bridge
